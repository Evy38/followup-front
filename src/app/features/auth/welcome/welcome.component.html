<div class="welcome-card">
  <h2 class="welcome-title">Je m'inscris</h2>

  <p class="welcome-text">
    Vous pouvez vous inscrire avec n'importe quelle adresse email.
  </p>

  <p class="welcome-text">
    Cependant, une adresse <strong>Gmail</strong> vous donnera accès à des fonctionnalités avancées à venir comme l'analyse automatique de vos emails de recruteurs pour suivre vos candidatures sans effort.
  </p>

  <p class="welcome-question">
    Vous avez un compte Gmail ?
  </p>

  <div class="button-group">
    <button type="button" class="btn-yes" (click)="onYes()">Oui, utiliser Gmail</button>
    <button type="button" class="btn-no" (click)="onNo()">Non, autre adresse</button>
  </div>
</div>
