name: CI - Continuous Integration

# Pipeline d'intégration continue : vérifie la qualité du code à chaque push/PR.
# Étapes : tests unitaires → build de validation pour chaque environnement (sit, uat, production).
# Le build n'est lancé que si les tests passent (needs: test).

# Déclenchement automatique sur push et pull request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1 : Tests et qualité de code
  test:
    name: Tests unitaires et qualité
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm ci
      
      - name: 🧪 Run unit tests
        run: npm test
      
      - name: 📊 Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
  
  # Job 2 : Build de validation
  build:
    name: Build pour validation
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        environment: [sit, uat, production]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm ci
      
      - name: 🔨 Build ${{ matrix.environment }}
        run: npm run build -- --configuration=${{ matrix.environment }}
      
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.environment }}-${{ github.sha }}
          path: dist/followup-front/browser
          retention-days: 7
      
      - name: 📏 Check bundle size
        run: |
          echo "📊 Taille du build ${{ matrix.environment }}:"
          du -sh dist/followup-front/browser
          echo "📦 Détail des fichiers:"
          ls -lh dist/followup-front/browser